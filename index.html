<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipment</title>
  <link rel="icon" href="./favicon.ico" />
  <style>
    * {
      box-sizing: border-box;
    }
    html {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body,
    button,
    input,
    select,
    textarea {
      font: inherit;
    }
    body {
      margin: 0;
      background: #0b0b0c;
      color: #f4f4f5;
    }
    header {
      padding: 36px 32px 18px;
    }
    h1 {
      margin: 0;
      font-size: 38px;
      letter-spacing: -0.04em;
    }
    .tabs {
      display: flex;
      gap: 10px;
      padding: 0 32px 18px;
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(11, 11, 12, 0.86);
      backdrop-filter: blur(12px);
    }
    .tab,
    .action-button,
    .small-button {
      border: 1px solid #27272a;
      background: #18181b;
      color: #f4f4f5;
      cursor: pointer;
      transition: 0.18s ease;
    }
    .tab {
      padding: 10px 14px;
      border-radius: 999px;
    }
    .tab:hover,
    .tab.active,
    .action-button:hover,
    .small-button:hover {
      border-color: #52525b;
      background: #27272a;
    }
    .view {
      display: none;
    }
    .view.active {
      display: block;
    }
    section {
      padding: 16px 32px 28px;
    }
    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
      color: #e4e4e7;
      letter-spacing: -0.01em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      background: linear-gradient(180deg, #18181b, #111113);
      border: 1px solid #27272a;
      border-radius: 20px;
      padding: 16px;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: #3f3f46;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }
    .image-wrap {
      position: relative;
      height: 168px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #09090b;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      border: 1px solid #1f1f23;
      transition: border-color 0.18s ease, background 0.18s ease;
      cursor: pointer;
    }
    .card:hover .image-wrap {
      border-color: #3f3f46;
      background: #0f0f12;
    }
    .image-wrap img {
      max-width: 100%;
      max-height: 154px;
      object-fit: contain;
      transition: transform 0.18s ease;
    }
    .card:hover img {
      transform: scale(1.04);
    }
    .fallback {
      display: none;
      width: 100%;
      height: 168px;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: #09090b;
      border-radius: 16px;
    }
    .copy-badge {
      position: absolute;
      bottom: 8px;
      right: 10px;
      background: #27272a;
      border: 1px solid #3f3f46;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.2s ease;
      max-width: calc(100% - 20px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .category {
      color: #a1a1aa;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }
    h3 a {
      color: #fff;
      text-decoration: none;
    }
    h3 a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .meta {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      color: #d4d4d8;
    }
    .available {
      color: #86efac;
    }
    .kit-layout,
    .builder-layout {
      display: grid;
      grid-template-columns: minmax(260px, 360px) 1fr;
      gap: 18px;
      padding: 16px 32px 40px;
    }
    .kit-list,
    .kit-details,
    .builder-panel,
    .builder-summary {
      background: #111113;
      border: 1px solid #27272a;
      border-radius: 20px;
      padding: 16px;
    }
    .kit-button {
      width: 100%;
      text-align: left;
      border: 1px solid #27272a;
      background: #18181b;
      color: #f4f4f5;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: 0.18s ease;
    }
    .kit-button:hover,
    .kit-button.active {
      border-color: #52525b;
      background: #27272a;
    }
    .kit-button-title {
      font-weight: 700;
      margin-bottom: 6px;
    }
    .kit-button-meta,
    .muted {
      color: #a1a1aa;
      font-size: 13px;
    }
    .kit-head,
    .builder-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .kit-title,
    .builder-title {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.03em;
    }
    .kit-description {
      color: #a1a1aa;
      margin: 8px 0 0;
    }
    .status-pill {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
      border: 1px solid #3f3f46;
      background: #18181b;
    }
    .status-ok {
      color: #86efac;
    }
    .status-warn {
      color: #fde68a;
    }
    .status-bad {
      color: #fca5a5;
    }
    .kit-items,
    .builder-items {
      display: grid;
      gap: 10px;
    }
    .kit-item,
    .builder-item {
      border: 1px solid #27272a;
      border-radius: 14px;
      background: #18181b;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }
    .kit-item-name,
    .builder-item-name {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .kit-item-sub,
    .builder-item-sub {
      color: #a1a1aa;
      font-size: 13px;
      line-height: 1.4;
    }
    .kit-item-count {
      color: #d4d4d8;
      font-size: 13px;
      text-align: right;
    }
    .builder-tools {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }
    .search-input,
    .filter-select {
      width: 100%;
      border: 1px solid #27272a;
      background: #09090b;
      color: #f4f4f5;
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
    }
    .search-input:focus,
    .filter-select:focus {
      border-color: #52525b;
    }
    .builder-options {
      display: grid;
      gap: 8px;
      max-height: 620px;
      overflow: auto;
      padding-right: 4px;
    }
    .builder-option {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      border: 1px solid #27272a;
      background: #18181b;
      color: #f4f4f5;
      padding: 10px;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.18s ease;
    }
    .builder-option:hover {
      border-color: #52525b;
      background: #27272a;
    }
    .option-thumb {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: #09090b;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 20px;
    }
    .option-thumb img {
      max-width: 100%;
      max-height: 38px;
      object-fit: contain;
    }
    .option-name {
      font-weight: 700;
      font-size: 14px;
      line-height: 1.25;
    }
    .option-meta {
      color: #a1a1aa;
      font-size: 12px;
      margin-top: 3px;
    }
    .option-count {
      color: #86efac;
      font-size: 13px;
      white-space: nowrap;
    }
    .builder-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }
    .small-button {
      width: 30px;
      height: 30px;
      border-radius: 10px;
    }
    .quantity {
      min-width: 22px;
      text-align: center;
    }
    .builder-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .action-button {
      border-radius: 12px;
      padding: 10px 12px;
    }
    .empty {
      padding: 24px;
      color: #a1a1aa;
    }
    .loading,
    .error {
      padding: 24px 32px;
      color: #a1a1aa;
    }
    @media (max-width: 900px) {
      header,
      section,
      .tabs {
        padding-left: 18px;
        padding-right: 18px;
      }
      h1 {
        font-size: 32px;
      }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      }
      .card {
        min-height: 290px;
      }
      .kit-layout,
      .builder-layout {
        grid-template-columns: 1fr;
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Equipment</h1>
  </header>
  <nav class="tabs">
    <button class="tab active" data-view="equipment">Equipment</button>
    <button class="tab" data-view="kits">Kits</button>
    <button class="tab" data-view="builder">Build Kit</button>
  </nav>
  <main>
    <div class="view active" id="equipment-view">
      <div id="equipment-content"></div>
    </div>
    <div class="view" id="kits-view">
      <div class="kit-layout">
        <aside class="kit-list" id="kit-list"></aside>
        <section class="kit-details" id="kit-details"></section>
      </div>
    </div>
    <div class="view" id="builder-view">
      <div class="builder-layout">
        <aside class="builder-panel">
          <div class="builder-head">
            <div>
              <h2 class="builder-title">Build Kit</h2>
              <div class="muted">Click equipment to add it.</div>
            </div>
          </div>
          <div class="builder-tools">
            <input class="search-input" id="builder-search" placeholder="Search equipment..." />
            <select class="filter-select" id="builder-category">
              <option value="all">All Groups</option>
            </select>
          </div>
          <div class="builder-options" id="builder-options"></div>
        </aside>
        <section class="builder-summary">
          <div class="builder-head">
            <div>
              <h2 class="builder-title">Your Kit</h2>
              <div class="muted" id="builder-summary-meta">No items selected.</div>
            </div>
          </div>
          <div class="builder-items" id="builder-items"></div>
          <div class="builder-actions">
            <button class="action-button" id="copy-kit-button">Copy Kit List</button>
            <button class="action-button" id="clear-kit-button">Clear</button>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script>
    const SUPABASE_URL = "https://phetizgmhisvajdkotip.supabase.co";
    const SUPABASE_KEY = "sb_publishable_HEauGmRE0MNAROz8dRrSAA_soNtQiBl";
    const IMAGE_BUCKET_URL = `${SUPABASE_URL}/storage/v1/object/public/equipment-images`;
    const GROUP_EMOJI = {
      "Audio Interfaces": "🎛️",
      "Microphones": "🎙️",
      "Headphones": "🎧",
      "Stands & Arms": "🦾",
      "Cables & Adapters": "🔌",
      "Cameras": "🎥",
      "Lenses": "🔭",
      "Video Interfaces": "📺",
      "Lights": "💡",
      "Controllers": "🎚️",
      "Storage": "💾",
      "Other": "📦"
    };
    let equipment = [];
    let kits = [];
    let kitItems = [];
    let selectedKitId = null;
    let customKit = {};
    function toTitleCase(value) {
      return String(value || "Other").replace(/_/g, " ").replace(/\w\S*/g, text => text.charAt(0).toUpperCase() + text.slice(1).toLowerCase());
    }
    function googleImageSearchUrl(name) {
      return `https://www.google.com/search?q=${encodeURIComponent(name)}&udm=2&tbs=ic:trans`;
    }
    function groupByUiGroup(items) {
      return items.reduce((acc, item) => {
        const key = item.ui_group || "Other";
        if (!acc[key]) acc[key] = [];
        acc[key].push(item);
        return acc;
      }, {});
    }
    function sortedGroups(grouped) {
      return Object.keys(grouped).sort((a, b) => {
        const aOrder = equipment.find(item => item.ui_group === a)?.ui_group_order ?? 999;
        const bOrder = equipment.find(item => item.ui_group === b)?.ui_group_order ?? 999;
        return aOrder - bOrder || a.localeCompare(b);
      });
    }
    function imageUrlFor(item) {
      return `${IMAGE_BUCKET_URL}/${item.model_id}.png`;
    }
    function renderCard(item) {
      const card = document.createElement("article");
      card.className = "card";
      const imageUrl = imageUrlFor(item);
      const manufacturerUrl = item.manufacturer_url || null;
      const fallbackUrl = googleImageSearchUrl(item.full_name);
      const title = manufacturerUrl ? `<a href="${manufacturerUrl}" target="_blank" rel="noopener noreferrer">${item.full_name}</a>` : item.full_name;
      card.innerHTML = `
        <div class="image-wrap" title="Copy Model ID">
          <img src="${imageUrl}" alt="${item.full_name}" loading="lazy" />
          <div class="fallback">🔎</div>
          <div class="copy-badge"></div>
        </div>
        <div class="category">${toTitleCase(item.ui_group || item.category || "Other")} / ${toTitleCase(item.subcategory || "Other")}</div>
        <h3>${title}</h3>
        <div class="meta">
          <span class="available">${item.available_units} / ${item.total_units} Available</span>
        </div>
      `;
      const img = card.querySelector("img");
      const fallback = card.querySelector(".fallback");
      const imageWrap = card.querySelector(".image-wrap");
      const badge = card.querySelector(".copy-badge");
      img.onerror = () => {
        img.style.display = "none";
        fallback.style.display = "flex";
        imageWrap.title = "Find Transparent Image";
      };
      imageWrap.addEventListener("click", async event => {
        event.preventDefault();
        event.stopPropagation();
        if (img.style.display === "none") {
          window.open(fallbackUrl, "_blank", "noopener,noreferrer");
          return;
        }
        try {
          await navigator.clipboard.writeText(item.model_id);
          badge.textContent = item.model_id;
          badge.style.opacity = "1";
          setTimeout(() => {
            badge.style.opacity = "0";
            badge.textContent = "";
          }, 1100);
        } catch (e) {
          console.error("copy failed", e);
        }
      });
      return card;
    }
    async function fetchSupabase(path) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      });
      if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
      return res.json();
    }
    async function loadEquipment() {
      const content = document.getElementById("equipment-content");
      content.innerHTML = `<div class="loading">Loading equipment…</div>`;
      try {
        equipment = await fetchSupabase("model_availability?select=*&order=ui_group_order.asc,sort_order.asc,full_name.asc");
        renderEquipment();
        setupBuilderFilters();
        renderBuilderOptions();
      } catch (error) {
        content.innerHTML = `<div class="error">Could not load equipment. Check Supabase key/API settings.</div>`;
        console.error(error);
      }
    }
    function renderEquipment() {
      const content = document.getElementById("equipment-content");
      const grouped = groupByUiGroup(equipment);
      content.innerHTML = "";
      sortedGroups(grouped).forEach(group => {
        const section = document.createElement("section");
        const title = document.createElement("h2");
        const grid = document.createElement("div");
        title.className = "section-title";
        title.textContent = `${GROUP_EMOJI[group] || GROUP_EMOJI.Other} ${group}`;
        grid.className = "grid";
        grouped[group].forEach(item => grid.appendChild(renderCard(item)));
        section.appendChild(title);
        section.appendChild(grid);
        content.appendChild(section);
      });
    }
    function kitStatusClass(count) {
      if (count >= 1) return "status-ok";
      return "status-bad";
    }
    function itemStatusClass(status) {
      if (status === "preferred_available") return "status-ok";
      if (status === "substitute_available") return "status-warn";
      return "status-bad";
    }
    function itemStatusLabel(status) {
      if (status === "preferred_available") return "Preferred";
      if (status === "substitute_available") return "Substitute";
      return "Missing";
    }
    function renderKitList() {
      const list = document.getElementById("kit-list");
      list.innerHTML = "";
      kits.forEach(kit => {
        const btn = document.createElement("button");
        btn.className = `kit-button ${kit.kit_id === selectedKitId ? "active" : ""}`;
        btn.innerHTML = `
          <div class="kit-button-title">${kit.name}</div>
          <div class="kit-button-meta">Available Kits: ${kit.available_kits ?? 0}</div>
        `;
        btn.onclick = () => {
          selectedKitId = kit.kit_id;
          renderKitList();
          renderKitDetails();
        };
        list.appendChild(btn);
      });
    }
    function renderKitDetails() {
      const details = document.getElementById("kit-details");
      const kit = kits.find(k => k.kit_id === selectedKitId);
      if (!kit) {
        details.innerHTML = `<div class="empty">Select a kit.</div>`;
        return;
      }
      const items = kitItems.filter(item => item.kit_id === selectedKitId);
      details.innerHTML = `
        <div class="kit-head">
          <div>
            <h2 class="kit-title">${kit.name}</h2>
            <p class="kit-description">${kit.description || ""}</p>
          </div>
          <div class="status-pill ${kitStatusClass(kit.available_kits)}">${kit.available_kits ?? 0} Available</div>
        </div>
        <div class="kit-items"></div>
      `;
      const container = details.querySelector(".kit-items");
      items.forEach(item => {
        const row = document.createElement("div");
        row.className = "kit-item";
        row.innerHTML = `
          <div>
            <div class="kit-item-name">${item.item_label || toTitleCase(item.required_role)}</div>
            <div class="kit-item-sub">Preferred: ${item.preferred_model_name || "—"}</div>
            <div class="kit-item-sub">Role: ${toTitleCase(item.required_role)}${item.allow_substitutes ? " · Substitutes Allowed" : " · No Substitutes"}</div>
            ${item.notes ? `<div class="kit-item-sub">${item.notes}</div>` : ""}
          </div>
          <div class="kit-item-count">
            <div>Need: ${item.quantity}</div>
            <div>Preferred: ${item.preferred_available_units}</div>
            <div>Any: ${item.any_matching_available_units}</div>
            <div class="${itemStatusClass(item.availability_status)}">${itemStatusLabel(item.availability_status)}</div>
          </div>
        `;
        container.appendChild(row);
      });
    }
    async function loadKits() {
      const list = document.getElementById("kit-list");
      const details = document.getElementById("kit-details");
      list.innerHTML = `<div class="loading">Loading kits…</div>`;
      details.innerHTML = `<div class="empty">Loading…</div>`;
      try {
        kits = await fetchSupabase("kit_availability?select=*&order=name.asc");
        kitItems = await fetchSupabase("kit_items_resolved?select=*&order=kit_name.asc,item_label.asc");
        selectedKitId = kits[0]?.kit_id || null;
        renderKitList();
        renderKitDetails();
      } catch (error) {
        list.innerHTML = `<div class="error">Could not load kits.</div>`;
        details.innerHTML = "";
        console.error(error);
      }
    }
    function setupBuilderFilters() {
      const groupSelect = document.getElementById("builder-category");
      const groups = sortedGroups(groupByUiGroup(equipment));
      groupSelect.innerHTML = `<option value="all">All Groups</option>`;
      groups.forEach(group => {
        const option = document.createElement("option");
        option.value = group;
        option.textContent = `${GROUP_EMOJI[group] || GROUP_EMOJI.Other} ${group}`;
        groupSelect.appendChild(option);
      });
    }
    function filteredBuilderEquipment() {
      const search = document.getElementById("builder-search").value.trim().toLowerCase();
      const group = document.getElementById("builder-category").value;
      return equipment.filter(item => {
        const matchesGroup = group === "all" || item.ui_group === group;
        const matchesSearch = !search || `${item.full_name} ${item.ui_group} ${item.category} ${item.subcategory} ${item.capability_role}`.toLowerCase().includes(search);
        return matchesGroup && matchesSearch;
      });
    }
    function renderBuilderOptions() {
      const container = document.getElementById("builder-options");
      const items = filteredBuilderEquipment();
      container.innerHTML = "";
      if (!items.length) {
        container.innerHTML = `<div class="empty">No equipment found.</div>`;
        return;
      }
      items.forEach(item => {
        const button = document.createElement("button");
        button.className = "builder-option";
        button.innerHTML = `
          <div class="option-thumb">
            <img src="${imageUrlFor(item)}" alt="${item.full_name}" loading="lazy" />
            <span style="display:none">🔎</span>
          </div>
          <div>
            <div class="option-name">${item.full_name}</div>
            <div class="option-meta">${toTitleCase(item.ui_group || item.category)} / ${toTitleCase(item.subcategory)}</div>
          </div>
          <div class="option-count">${item.available_units} / ${item.total_units}</div>
        `;
        const img = button.querySelector("img");
        const fallback = button.querySelector("span");
        img.onerror = () => {
          img.style.display = "none";
          fallback.style.display = "inline";
        };
        button.onclick = () => addToCustomKit(item.model_id);
        container.appendChild(button);
      });
    }
    function addToCustomKit(modelId) {
      const item = equipment.find(entry => entry.model_id === modelId);
      if (!item) return;
      const current = customKit[modelId] || 0;
      if (current >= Number(item.total_units || 0)) return;
      customKit[modelId] = current + 1;
      renderCustomKit();
    }
    function removeFromCustomKit(modelId) {
      if (!customKit[modelId]) return;
      customKit[modelId] -= 1;
      if (customKit[modelId] <= 0) delete customKit[modelId];
      renderCustomKit();
    }
    function clearCustomKit() {
      customKit = {};
      renderCustomKit();
    }
    function customKitRows() {
      return Object.entries(customKit).map(([modelId, quantity]) => {
        const item = equipment.find(entry => entry.model_id === modelId);
        return { item, quantity };
      }).filter(row => row.item);
    }
    function renderCustomKit() {
      const container = document.getElementById("builder-items");
      const meta = document.getElementById("builder-summary-meta");
      const rows = customKitRows();
      const totalItems = rows.reduce((sum, row) => sum + row.quantity, 0);
      meta.textContent = rows.length ? `${totalItems} item${totalItems === 1 ? "" : "s"} selected across ${rows.length} model${rows.length === 1 ? "" : "s"}.` : "No items selected.";
      container.innerHTML = "";
      if (!rows.length) {
        container.innerHTML = `<div class="empty">Click equipment on the left to add it here.</div>`;
        return;
      }
      rows.forEach(({ item, quantity }) => {
        const ok = quantity <= Number(item.available_units || 0);
        const row = document.createElement("div");
        row.className = "builder-item";
        row.innerHTML = `
          <div>
            <div class="builder-item-name">${item.full_name}</div>
            <div class="builder-item-sub">${toTitleCase(item.ui_group || item.category)} / ${toTitleCase(item.subcategory)}</div>
            <div class="builder-item-sub ${ok ? "status-ok" : "status-bad"}">${quantity} selected · ${item.available_units} available</div>
          </div>
          <div class="builder-controls">
            <button class="small-button" data-action="minus">−</button>
            <div class="quantity">${quantity}</div>
            <button class="small-button" data-action="plus">+</button>
          </div>
        `;
        row.querySelector('[data-action="minus"]').onclick = () => removeFromCustomKit(item.model_id);
        row.querySelector('[data-action="plus"]').onclick = () => addToCustomKit(item.model_id);
        container.appendChild(row);
      });
    }
    async function copyCustomKit() {
      const rows = customKitRows();
      if (!rows.length) return;
      const text = rows.map(({ item, quantity }) => `${quantity} × ${item.full_name} (${item.model_id})`).join("\n");
      await navigator.clipboard.writeText(text);
      const button = document.getElementById("copy-kit-button");
      button.textContent = "Copied";
      setTimeout(() => {
        button.textContent = "Copy Kit List";
      }, 900);
    }
    function setupBuilder() {
      document.getElementById("builder-search").addEventListener("input", renderBuilderOptions);
      document.getElementById("builder-category").addEventListener("change", renderBuilderOptions);
      document.getElementById("copy-kit-button").onclick = copyCustomKit;
      document.getElementById("clear-kit-button").onclick = clearCustomKit;
      renderCustomKit();
    }
    function setupTabs() {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.onclick = () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
          tab.classList.add("active");
          document.getElementById(`${tab.dataset.view}-view`).classList.add("active");
        };
      });
    }
    setupTabs();
    setupBuilder();
    loadEquipment();
    loadKits();
  </script>
</body>
</html>
